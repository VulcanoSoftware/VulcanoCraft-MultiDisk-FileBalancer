name: Build and Release

on:
  push:
    branches:
      - "*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller -i icon.ico --name VulcanoCraft-MultiDisk-FileBalancer --onefile vulcanocraft_multidisk_filebalancer.py

      - name: Prepare Linux packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm
          sudo gem install --no-document fpm
          fpm -s dir -t deb -n vulcanocraft-multidisk-filebalancer -v 1.0.${{ github.run_number }} --prefix /usr/bin dist/VulcanoCraft-MultiDisk-FileBalancer=/usr/bin/vulcanocraft-multidisk-filebalancer
          fpm -s dir -t rpm -n vulcanocraft-multidisk-filebalancer -v 1.0.${{ github.run_number }} --prefix /usr/bin dist/VulcanoCraft-MultiDisk-FileBalancer=/usr/bin/vulcanocraft-multidisk-filebalancer

      - name: Prepare macOS DMG
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dist/dmg_content
          cp dist/VulcanoCraft-MultiDisk-FileBalancer dist/dmg_content/
          hdiutil create -volname "VulcanoCraft FileBalancer" -srcfolder dist/dmg_content -ov -format UDZO VulcanoCraft-MultiDisk-FileBalancer.dmg

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir staging
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp dist/VulcanoCraft-MultiDisk-FileBalancer.exe staging/
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cp *.deb staging/
            cp *.rpm staging/
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp *.dmg staging/
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: staging/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Release Build ${{ github.run_number }}
          files: ./artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
